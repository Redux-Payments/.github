name: Claude Code Review

on:
  workflow_call:
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Fetch shared review prompt
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/Redux-Payments/.github/contents/.github/prompts/code-review.md \
            --jq '.content' | base64 -d > /tmp/review-prompt.md

      - name: Delete stale progress-tracking comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api --paginate "repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" \
            --jq '.[] | select(.user.login == "claude[bot]") | select(.body | test("Review complete")) | .id' \
          | while read -r id; do
              gh api -X DELETE "repos/${{ github.repository }}/issues/comments/$id" || true
            done

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Read /tmp/review-prompt.md for the base review instructions and follow them.

            ## How to post feedback

            Use `mcp__github_inline_comment__create_inline_comment` for issues found.
            Put each comment on the relevant line of code.

            Before posting, run `gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/comments` to check for duplicates.

            Do NOT post top-level PR comments. The progress tracking comment serves as the summary.
            Only post inline comments — don't submit review text as messages.

          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh api:*),Bash(cat /tmp/review-prompt.md)"
