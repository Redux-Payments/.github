name: Gemini Code Review

on:
  workflow_call:
    secrets:
      GEMINI_API_KEY:
        required: true

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Fetch shared review prompt and PR metadata
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/Redux-Payments/.github/contents/.github/prompts/code-review.md \
            --jq '.content' | base64 -d > /tmp/review-prompt.md
          gh pr diff ${{ github.event.pull_request.number }} > /tmp/pr.diff
          echo "head_sha=$(gh pr view ${{ github.event.pull_request.number }} --json headRefOid -q .headRefOid)" >> "$GITHUB_OUTPUT"

      - uses: google-github-actions/run-gemini-cli@v0
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          prompt: |
            You are reviewing PR #${{ github.event.pull_request.number }} in ${{ github.repository }}.

            Read /tmp/review-prompt.md for the base review instructions and follow them.
            The PR diff is at /tmp/pr.diff. Read it.

            Prefix each comment body with "🤖 **Gemini**:" so it's clear which reviewer posted it.

            ## How to post feedback

            For each issue found, post an inline review comment using:

            gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/comments \
              -f body="<your comment>" \
              -f commit_id="${{ steps.pr.outputs.head_sha }}" \
              -f path="<file path>" \
              -F line=<line number> \
              -f side="RIGHT"

            Before posting, run `gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/comments` to check for duplicates.

            Do NOT post top-level PR comments. Only post inline comments on specific lines.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
